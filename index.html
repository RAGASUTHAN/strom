<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Login - MFA</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #2563eb;
    }

    .hidden {
      display: none;
    }

    .risk {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Login Form -->
  <div id="loginForm">
    <h2>Secure Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <!-- OTP Form -->
  <div id="otpForm" class="hidden">
    <h2>Enter OTP</h2>
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify</button>
    <div class="risk" id="riskScore"></div>
  </div>

</div>

<script>
  let currentRisk = 0;

  function login() {
    const email = document.getElementById("email").value;

    // Simulated AI risk scoring
    currentRisk = Math.floor(Math.random() * 100);

    alert("Risk Score: " + currentRisk);

    if (currentRisk > 30) {
      document.getElementById("loginForm").classList.add("hidden");
      document.getElementById("otpForm").classList.remove("hidden");

      document.getElementById("riskScore").innerText =
        "Risk Score: " + currentRisk;
    } else {
      alert("Login Successful (Low Risk)");
    }
  }

  function verifyOTP() {
    const otp = document.getElementById("otp").value;

    if (otp === "1234") {
      alert("Login Successful with MFA ✅");
    } else {
      alert("Invalid OTP ❌");
    }
  }
</script>

</body>
</html>
